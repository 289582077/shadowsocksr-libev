name: Build SSR-Local Android

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK
        # 使用官方 Action 安装 NDK，比 Docker 更可靠
        uses: nndk/nndk@v1
        with:
          ndk-version: r21e 

      - name: Install Build Essentials
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential autoconf libtool

      - name: Build with CMake
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.arch }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) ssr-local

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssr-local-${{ matrix.arch }}
          path: build/ssr-local
