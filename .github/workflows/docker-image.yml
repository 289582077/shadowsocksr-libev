name: Build SSR-Local Android

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SSR
        run: |
          # 1. 使用 GitHub 宿主机自带的 NDK 路径
          # 通常路径在 /usr/local/lib/android/sdk/ndk-bundle 或通过环境变量 ANDROID_NDK_LATEST_HOME 获取
          NDK_PATH=$ANDROID_NDK_LATEST_HOME
          
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.arch }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release
          
          make -j$(nproc) ssr-local

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssr-local-${{ matrix.arch }}
          path: build/ssr-local
